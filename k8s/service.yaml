apiVersion: v1
kind: Service
metadata:
  name: race-ai-copilot-api
  namespace: race-ai-copilot
spec:
  selector:
    app: race-ai-copilot-api
  ports:
    - name: http
      port: 8050
      targetPort: 8050
---
apiVersion: v1
kind: Service
metadata:
  name: race-ai-chat-ui
  namespace: race-ai-copilot
spec:
  selector:
    app: race-ai-chat-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: race-ai-copilot
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
