apiVersion: apps/v1
kind: Deployment
metadata:
  name: race-ai-chat-ui
  namespace: race-ai-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: race-ai-chat-ui
  template:
    metadata:
      labels:
        app: race-ai-chat-ui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: WEBUI_NAME
              value: Race AI Copilot
