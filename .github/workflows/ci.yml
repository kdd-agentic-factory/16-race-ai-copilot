name: CI

on:
  pull_request:
  push:
    branches:
      - main

# NOTE: reusable workflows from the private 12-ci-cd-security repo are NOT
# resolvable from public repos (runs die at compile time with 0 jobs). Docker
# job inlined, same pattern as 00/07/17. The image must match fly.toml: build
# from the repo-root multi-stage Dockerfile (context "."). Restore the
# reusables if 12-ci-cd-security is ever made public.
jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r backend/requirements.txt -r services/copilot-api/requirements.txt pytest pytest-asyncio httpx
      - name: Pytest
        # Suite runs from the repo root: pytest.ini sets pythonpath
        # (services/copilot-api + backend/src) and testpaths=tests.
        run: python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/kdd-agentic-factory/race-ai-copilot
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
